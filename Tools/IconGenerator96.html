        <div class="bg-dark"><canvas id="prevDark" width="96" height="96" style="width:64px;height:64px;"></canvas></div>
        <p>暗い背景</p>
      </div>
    </div>

<script>
// Helper: scale from 32-space to 96-space
function s(v) { return v * 3; }

// Current preset name
let currentPreset = '';

// Copy canvas to all preview canvases
function syncPreviews() {
  const src = document.getElementById('main');
  const targets = ['ribbon32', 'ribbon48', 'ribbon64', 'compareNew', 'prevLight', 'prevDark'];
  targets.forEach(id => {
    const c = document.getElementById(id);
    const ctx2 = c.getContext('2d');
    ctx2.clearRect(0, 0, 96, 96);
    ctx2.drawImage(src, 0, 0);
  });
}

// Run the code in textarea
function runCode() {
  const canvas = document.getElementById('main');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 96, 96);

  try {
    const fn = new Function('ctx', 's', document.getElementById('code').value);
    fn(ctx, s);
    syncPreviews();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// Download PNG with DPI=288
function downloadPNG() {
  const canvas = document.getElementById('main');
  canvas.toBlob(blob => {
    // Read as ArrayBuffer to inject pHYs chunk for DPI=288
    const reader = new FileReader();
    reader.onload = function() {
      const pngWithDpi = injectDPI(new Uint8Array(reader.result), 288);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([pngWithDpi], {type:'image/png'}));
      a.download = (currentPreset || 'icon') + '_96.png';
      a.click();
    };
    reader.readAsArrayBuffer(blob);
  }, 'image/png');
}

// Inject pHYs chunk into PNG for DPI metadata
function injectDPI(pngData, dpi) {
  const ppm = Math.round(dpi / 0.0254); // pixels per meter
  // pHYs chunk: 4 bytes X ppm + 4 bytes Y ppm + 1 byte unit(1=meter)
  const phys = new Uint8Array(25); // 4 len + 4 type + 9 data + 4 crc
  const view = new DataView(phys.buffer);
  view.setUint32(0, 9); // data length
  phys[4]=0x70; phys[5]=0x48; phys[6]=0x59; phys[7]=0x73; // "pHYs"
  view.setUint32(8, ppm);
  view.setUint32(12, ppm);
  phys[16] = 1; // unit = meter

  // CRC32 of type+data
  const crcData = phys.slice(4, 17);
  view.setUint32(17, crc32(crcData));

  // Insert pHYs before first IDAT chunk
  const result = [];
  let i = 8; // skip PNG signature
  result.push(...pngData.slice(0, 8)); // signature

  let inserted = false;
  while (i < pngData.length) {
    const chunkLen = (pngData[i]<<24)|(pngData[i+1]<<16)|(pngData[i+2]<<8)|pngData[i+3];
    const chunkType = String.fromCharCode(pngData[i+4], pngData[i+5], pngData[i+6], pngData[i+7]);
    const totalChunkSize = 12 + chunkLen;

    if (chunkType === 'pHYs') {
      // Skip existing pHYs
      i += totalChunkSize;
      continue;
    }

    if (!inserted && chunkType === 'IDAT') {
      result.push(...phys);
      inserted = true;
    }

    result.push(...pngData.slice(i, i + totalChunkSize));
    i += totalChunkSize;
  }

  return new Uint8Array(result);
}

// CRC32 implementation
function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) {
      crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
    }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// Load original icon for comparison
function loadOriginal(name) {
  const img = document.getElementById('origImg');
  img.src = '../Resources/Icons/' + name + '_32.png';
  img.onerror = () => { img.alt = '元画像なし'; };
}

// ============================================================
// PRESETS - Drawing code for each icon
// ============================================================
const PRESETS = {};

PRESETS.both = `
// 通り芯・レベル 両端表示
const DARK = '#323232';
const R = 3;

// Lines: bubble center to bubble center only (no overhang)
ctx.strokeStyle = DARK;
ctx.lineWidth = s(1);

ctx.beginPath();
// Vertical lines (top bubble bottom → bottom bubble top)
ctx.moveTo(s(10), s(4+R)); ctx.lineTo(s(10), s(28-R));
ctx.moveTo(s(22), s(4+R)); ctx.lineTo(s(22), s(28-R));
// Horizontal lines (left bubble right → right bubble left)
ctx.moveTo(s(4+R), s(10)); ctx.lineTo(s(28-R), s(10));
ctx.moveTo(s(4+R), s(22)); ctx.lineTo(s(28-R), s(22));
ctx.stroke();

function drawBubble(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(s(cx), s(cy), s(r), 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = DARK;
  ctx.lineWidth = s(1.2);
  ctx.stroke();
}

drawBubble(10, 4, R);
drawBubble(22, 4, R);
drawBubble(10, 28, R);
drawBubble(22, 28, R);
drawBubble(4, 10, R);
drawBubble(4, 22, R);
drawBubble(28, 10, R);
drawBubble(28, 22, R);
`;

PRESETS.left = `
// 通り芯・レベル 左端のみ
const DARK = '#323232';
const R = 3;

ctx.strokeStyle = DARK;
ctx.lineWidth = s(1);

ctx.beginPath();
// Vertical lines: top bubble → bottom of canvas (no bottom bubble)
ctx.moveTo(s(10), s(4+R)); ctx.lineTo(s(10), s(28));
ctx.moveTo(s(22), s(4+R)); ctx.lineTo(s(22), s(28));
// Horizontal lines: left bubble → right of canvas (no right bubble)
ctx.moveTo(s(4+R), s(10)); ctx.lineTo(s(28), s(10));
ctx.moveTo(s(4+R), s(22)); ctx.lineTo(s(28), s(22));
ctx.stroke();

function drawBubble(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(s(cx), s(cy), s(r), 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = DARK;
  ctx.lineWidth = s(1.2);
  ctx.stroke();
}

drawBubble(10, 4, R);
drawBubble(22, 4, R);
drawBubble(4, 10, R);
drawBubble(4, 22, R);
`;

PRESETS.right = `
// 通り芯・レベル 右端のみ
const DARK = '#323232';
const R = 3;

ctx.strokeStyle = DARK;
ctx.lineWidth = s(1);

ctx.beginPath();
// Vertical lines: top of canvas → bottom bubble top
ctx.moveTo(s(10), s(4)); ctx.lineTo(s(10), s(28-R));
ctx.moveTo(s(22), s(4)); ctx.lineTo(s(22), s(28-R));
// Horizontal lines: left of canvas → right bubble left
ctx.moveTo(s(4), s(10)); ctx.lineTo(s(28-R), s(10));
ctx.moveTo(s(4), s(22)); ctx.lineTo(s(28-R), s(22));
ctx.stroke();

function drawBubble(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(s(cx), s(cy), s(r), 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = DARK;
  ctx.lineWidth = s(1.2);
  ctx.stroke();
}

drawBubble(10, 28, R);
drawBubble(22, 28, R);
drawBubble(28, 10, R);
drawBubble(28, 22, R);
`;

PRESETS.room_tag = `
// 部屋タグ (表形式)
const BLK = '#000000';
const LW = s(1);
ctx.strokeStyle = BLK;
ctx.lineWidth = LW;

// Outer border
ctx.strokeRect(s(1.5), s(1.5), s(29), s(29));

// Header row bottom
ctx.beginPath();
ctx.moveTo(s(1.5), s(11)); ctx.lineTo(s(30.5), s(11));
// Row dividers
ctx.moveTo(s(1.5), s(16.5)); ctx.lineTo(s(30.5), s(16.5));
ctx.moveTo(s(1.5), s(21.5)); ctx.lineTo(s(30.5), s(21.5));
ctx.moveTo(s(1.5), s(26.5)); ctx.lineTo(s(30.5), s(26.5));
ctx.stroke();

// Column dividers (below header only)
ctx.beginPath();
ctx.moveTo(s(9.5), s(11)); ctx.lineTo(s(9.5), s(30.5));
ctx.moveTo(s(20), s(11)); ctx.lineTo(s(20), s(26.5));
ctx.stroke();
`;

PRESETS.filled_region = `
// 塗潰し領域 分割・統合
// 左矩形: クロスハッチ(＼＋／)、右矩形: 単方向斜め線(＼)
// clip() で矩形内にハッチングを収める
const GRAY = '#646464';

function hatchRect(rx, ry, rw, rh, lineW, step, cross) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(s(rx), s(ry), s(rw), s(rh));
  ctx.clip();
  ctx.strokeStyle = GRAY;
  ctx.lineWidth = s(lineW);
  ctx.beginPath();
  // \\ diagonal lines (top-left to bottom-right)
  for (let d = -rh; d <= rw; d += step) {
    ctx.moveTo(s(rx + d),      s(ry));
    ctx.lineTo(s(rx + d + rh), s(ry + rh));
  }
  if (cross) {
    // / diagonal lines (top-right to bottom-left)
    for (let d = 0; d <= rw + rh; d += step) {
      ctx.moveTo(s(rx + d),      s(ry));
      ctx.lineTo(s(rx + d - rh), s(ry + rh));
    }
  }
  ctx.stroke();
  ctx.restore();
  // Border on top of hatch
  ctx.strokeStyle = GRAY;
  ctx.lineWidth = s(0.8);
  ctx.strokeRect(s(rx), s(ry), s(rw), s(rh));
}

// Left: cross-hatch (元の2×2チェッカー模様に対応)
hatchRect(1.5, 1.5, 12, 22, 0.8, 4, true);
// Right: single \\ diagonal (元の単方向斜め線に対応)
hatchRect(18.5, 1.5, 12, 22, 0.7, 4, false);

// Split/merge arrows at bottom
ctx.strokeStyle = GRAY;
ctx.lineWidth = s(0.7);
ctx.beginPath();
const ay = s(27);
// Left arrow <
ctx.moveTo(s(12), s(24.5)); ctx.lineTo(s(8), ay); ctx.lineTo(s(12), s(29.5));
// Right arrow >
ctx.moveTo(s(20), s(24.5)); ctx.lineTo(s(24), ay); ctx.lineTo(s(20), s(29.5));
// Connecting line
ctx.moveTo(s(8), ay); ctx.lineTo(s(24), ay);
ctx.stroke();
`;

PRESETS.sheet_creation = `
// シート一括作成（3枚重ね + 図枠 + 右下表題欄、A版縦横比）
const DARK = '#323232';
const MID = '#5C5C5C';
const LIGHT = '#B0B0B0';

// --- 3枚目（最背面）: A版縦横比 26:18 ---
ctx.fillStyle = '#f0f0f0';
ctx.fillRect(s(6), s(5), s(26), s(18));
ctx.strokeStyle = LIGHT;
ctx.lineWidth = s(0.6);
ctx.strokeRect(s(6), s(5), s(26), s(18));

// --- 2枚目（中間）---
ctx.fillStyle = '#f5f5f5';
ctx.fillRect(s(3), s(8), s(26), s(18));
ctx.strokeStyle = MID;
ctx.lineWidth = s(0.6);
ctx.strokeRect(s(3), s(8), s(26), s(18));

// --- 1枚目（最前面）---
// シート外枠
ctx.fillStyle = '#ffffff';
ctx.fillRect(s(0.5), s(11), s(26), s(18));
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.6);
ctx.strokeRect(s(0.5), s(11), s(26), s(18));

// 図枠線
ctx.strokeStyle = MID;
ctx.lineWidth = s(0.6);
ctx.strokeRect(s(2.5), s(13), s(22), s(14));

// 右下の表題欄（図枠線と同色・同太さ）
ctx.strokeStyle = MID;
ctx.lineWidth = s(0.6);
ctx.strokeRect(s(16.5), s(24), s(8), s(3));
`;

PRESETS.beam_under_level = `
// 梁下端色分け: I型梁(上) + 上矢印(先端=梁下端) + 一点破線FL(下) + ▼マーカー + 3色ブロック(右)
// I型梁: 上フランジy=1..4, 下フランジy=14..17, ウェブy=4..14 → 梁下端=y17
const DARK = '#505050';
const MID = '#787878';
const PINK = [255,128,148];
const YELLOW = [218,185,47];
const BLUE = [30,144,255];

// I-beam
ctx.fillStyle = MID;
ctx.fillRect(s(3), s(1),  s(14), s(3));   // Top flange
ctx.fillRect(s(3), s(14), s(14), s(3));   // Bottom flange (bottom edge y=17)
ctx.fillRect(s(8), s(4),  s(4),  s(10));  // Web

// Up arrow: tip at beam bottom (y=17), shaft y=21→y=25
ctx.fillStyle = DARK;
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
ctx.beginPath();
ctx.moveTo(s(10), s(21)); ctx.lineTo(s(10), s(25));
ctx.stroke();
ctx.beginPath();
ctx.moveTo(s(10), s(17));     // tip touches beam bottom
ctx.lineTo(s(7.5), s(21));
ctx.lineTo(s(12.5), s(21));
ctx.closePath();
ctx.fill();

// Dash-dot FL line at y=27 (一点破線: 長破線・点・長破線…)
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
ctx.setLineDash([s(3), s(1.2), s(0.5), s(1.2)]);
ctx.beginPath();
ctx.moveTo(s(1), s(27)); ctx.lineTo(s(20), s(27));
ctx.stroke();
ctx.setLineDash([]);

// ▼ Triangle: base at top, vertex (bottom) touching FL line at y=27
ctx.beginPath();
ctx.moveTo(s(2.5), s(23));  // top-left
ctx.lineTo(s(5.5), s(23));  // top-right
ctx.lineTo(s(4),   s(27));  // bottom vertex touching FL line
ctx.closePath();
ctx.fillStyle = DARK;
ctx.fill();

// 3 color blocks on right
const bx = s(22), bw = s(8), bh = s(8);
[[PINK,1],[YELLOW,11],[BLUE,21]].forEach(([c, y]) => {
  ctx.fillStyle = 'rgb('+c.join(',')+')';
  ctx.fillRect(bx, s(y), bw, bh);
});
`;

PRESETS.beam_top_level = `
// 梁天端色分け: 一点破線FL(上) + ▼マーカー + 下矢印(先端=梁上端) + I型梁(下) + 3色ブロック(右)
// I型梁はbeam_under_levelと同形状: フランジ3+ウェブ10+フランジ3=16単位
// 配置: 上端y=15, 下端y=31 (beam_under_levelのy=1..17を上下反転・下部配置)
const DARK = '#505050';
const MID = '#787878';
const PINK = [255,128,148];
const YELLOW = [218,185,47];
const BLUE = [30,144,255];

// Dash-dot FL line at y=5 (一点破線)
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
ctx.setLineDash([s(3), s(1.2), s(0.5), s(1.2)]);
ctx.beginPath();
ctx.moveTo(s(1), s(5)); ctx.lineTo(s(20), s(5));
ctx.stroke();
ctx.setLineDash([]);

// ▼ Triangle: base at top (y=1), vertex (bottom) touching FL line at y=5
ctx.beginPath();
ctx.moveTo(s(2.5), s(1));  // top-left
ctx.lineTo(s(5.5), s(1));  // top-right
ctx.lineTo(s(4),   s(5));  // bottom vertex touching FL line
ctx.closePath();
ctx.fillStyle = DARK;
ctx.fill();

// Down arrow: shaft y=7→y=11, tip at beam top (y=15)
ctx.fillStyle = DARK;
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
ctx.beginPath();
ctx.moveTo(s(10), s(7)); ctx.lineTo(s(10), s(11));
ctx.stroke();

PRESETS.flag_us = `
// US フラグ: 横長 13本縞(7赤6白) + 青カントン(7縞×40%幅) + 白5角星 32px論理サイズ
// 星: 4列×3行 ─ カントン内で均等余白
const US_RED  = '#B22234';
const US_BLUE = '#3C3B6E';
const BORDER  = '#1E1E1E';

const y0 = s(5), y1 = s(27);
const totalH = y1 - y0;
const N = 13;
const stripeH = totalH / N;

// 13 ストライプ
for (let i = 0; i < N; i++) {
  const ya = y0 + i * stripeH;
  const yb = y0 + (i + 1) * stripeH;
  ctx.fillStyle = i % 2 === 0 ? US_RED : '#FFFFFF';
  ctx.fillRect(0, ya, 96, yb - ya + 0.5);
}

// 青カントン (7ストライプ分の高さ, canton_x = 40% of width = s(12.8))
const cantonW = s(12.8);
const cantonH = 7 * stripeH;
ctx.fillStyle = US_BLUE;
ctx.fillRect(0, y0, cantonW, cantonH);

// 白5角星ヘルパー
function drawStar(cx, cy, ro, ri) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = Math.PI * (-0.5 + i / 5);
    const r = i % 2 === 0 ? ro : ri;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
            : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
}

// 4列×3行 均等余白配置
// cols: cantonW / (4*2) * [1,3,5,7]
// rows in 7-stripe canton: 7/(3*2) * [1,3,5] stripe-multiples
const colXs = [1,3,5,7].map(k => k * cantonW / 8);
const rowYs = [1,3,5].map(k => y0 + k * (7 * stripeH) / 6);

rowYs.forEach(cy => {
  colXs.forEach(cx => {
    drawStar(cx, cy, s(1.2), s(1.2 * 0.382));
  });
});

// 外枠
ctx.strokeStyle = BORDER;
ctx.lineWidth = s(0.5);
ctx.strokeRect(0.5, y0 + 0.5, 95, y1 - y0 - 1);
`;

PRESETS.flag_cn = `
// 中国語フラグ: 横長赤地 + 黄色5角星 (Wikimedia SVG 900×600 公式比率)
// 大星: (225/900, 150/600) = 左から25%, 上から25%
// 小星: (450,54)(525,105)(525,195)(450,246)/900×600
const CN_RED = '#DE2910';
const CN_YEL = '#FFDE00';
const BORDER = '#1E1E1E';

const y0 = s(5), y1 = s(27);
const FW = 32, FH = 22;  // flag dimensions (logical units)

// 赤背景
ctx.fillStyle = CN_RED;
ctx.fillRect(0, y0, 96, y1 - y0);

// 5角星描画ヘルパー
function drawStar(cx, cy, ro, ri) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = Math.PI * (-0.5 + i / 5);
    const r = i % 2 === 0 ? ro : ri;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
            : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
  ctx.fillStyle = CN_YEL;
  ctx.fill();
}

const X_SHIFT = -0.07;        // 全星: 7% 左シフト
const X_SHIFT_SMALL = -0.03;  // 小星のみ追加で 3% 左シフト

// 大星: (225/900, 150/600)
drawStar(s(FW * (225/900 + X_SHIFT)), y0 + (y1 - y0) * (150/600), s(3.5), s(3.5 * 0.382));

// 小星×4 (X_SHIFT + X_SHIFT_SMALL 適用)
[[450, 54], [525, 105], [525, 195], [450, 246]].forEach(([x, y]) => {
  const cx = s(FW * (x/900 + X_SHIFT + X_SHIFT_SMALL));
  const cy = y0 + (y1 - y0) * (y/600);
  drawStar(cx, cy, s(1.2), s(1.2 * 0.382));
});

// 外枠
ctx.strokeStyle = BORDER;
ctx.lineWidth = s(0.5);
ctx.strokeRect(0.5, y0 + 0.5, 95, y1 - y0 - 1);
`;

// Preset selection handler
document.getElementById('presetSelect').addEventListener('change', function() {
  const name = this.value;
  if (name && PRESETS[name]) {
    currentPreset = name;
    document.getElementById('code').value = PRESETS[name].trim();
    loadOriginal(name);
    runCode();
  }
});

// Auto-run on load with "both" preset
window.addEventListener('load', () => {
  document.getElementById('presetSelect').value = 'both';
  currentPreset = 'both';
  document.getElementById('code').value = PRESETS.both.trim();
  loadOriginal('both');
  setTimeout(runCode, 100);
});
