  .preview-box { text-align: center; }

  .preview-box p { font-size: 11px; color: #666; margin: 4px 0 0; }

  .bg-dark { background: #555; padding: 10px; display: inline-block; }

</head>

  <!-- Right: Previews -->

      <div class="preview-box">
        <div class="bg-ribbon">

          <span>48px表示</span>

      </div>
      <div class="preview-box">

        <p>200% DPI</p>
      </div>

    <!-- Compare with original -->

      <div class="compare-box">
        <canvas id="compareNew" width="96" height="96" style="width:96px;height:96px;"></canvas>
        <p>新 (96x96)</p>

    <!-- Background variations -->

      <div class="preview-box">
        <div class="bg-light"><canvas id="prevLight" width="96" height="96" style="width:64px;height:64px;"></canvas></div>
        <p>明るい背景</p>
      </div>
      <div class="preview-box">
        <div class="bg-dark"><canvas id="prevDark" width="96" height="96" style="width:64px;height:64px;"></canvas></div>
        <p>暗い背景</p>
      </div>
    </div>
  </div>
</div>

<script>
// Helper: scale from 32-space to 96-space
function s(v) { return v * 3; }

// Current preset name
let currentPreset = '';

// Copy canvas to all preview canvases
function syncPreviews() {
  const src = document.getElementById('main');
  const targets = ['ribbon32', 'ribbon48', 'ribbon64', 'compareNew', 'prevLight', 'prevDark'];
  targets.forEach(id => {
    const c = document.getElementById(id);
    const ctx2 = c.getContext('2d');
    ctx2.clearRect(0, 0, 96, 96);
    ctx2.drawImage(src, 0, 0);
  });
}

// Run the code in textarea
function runCode() {
  const canvas = document.getElementById('main');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 96, 96);

  try {
    const fn = new Function('ctx', 's', document.getElementById('code').value);
    fn(ctx, s);
    syncPreviews();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// Download PNG with DPI=288
function downloadPNG() {
  const canvas = document.getElementById('main');
  canvas.toBlob(blob => {
    // Read as ArrayBuffer to inject pHYs chunk for DPI=288
    const reader = new FileReader();
    reader.onload = function() {
      const pngWithDpi = injectDPI(new Uint8Array(reader.result), 288);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([pngWithDpi], {type:'image/png'}));
      a.download = (currentPreset || 'icon') + '_96.png';
      a.click();
    };
    reader.readAsArrayBuffer(blob);
  }, 'image/png');
}

// Inject pHYs chunk into PNG for DPI metadata
function injectDPI(pngData, dpi) {
  const ppm = Math.round(dpi / 0.0254); // pixels per meter
  // pHYs chunk: 4 bytes X ppm + 4 bytes Y ppm + 1 byte unit(1=meter)
  const phys = new Uint8Array(25); // 4 len + 4 type + 9 data + 4 crc
  const view = new DataView(phys.buffer);
  view.setUint32(0, 9); // data length
  phys[4]=0x70; phys[5]=0x48; phys[6]=0x59; phys[7]=0x73; // "pHYs"
  view.setUint32(8, ppm);
  view.setUint32(12, ppm);
  phys[16] = 1; // unit = meter

  // CRC32 of type+data
  const crcData = phys.slice(4, 17);
  view.setUint32(17, crc32(crcData));

  // Insert pHYs before first IDAT chunk
  const result = [];
  let i = 8; // skip PNG signature
  result.push(...pngData.slice(0, 8)); // signature

  let inserted = false;
  while (i < pngData.length) {
    const chunkLen = (pngData[i]<<24)|(pngData[i+1]<<16)|(pngData[i+2]<<8)|pngData[i+3];
    const chunkType = String.fromCharCode(pngData[i+4], pngData[i+5], pngData[i+6], pngData[i+7]);
    const totalChunkSize = 12 + chunkLen;

    if (chunkType === 'pHYs') {
      // Skip existing pHYs
      i += totalChunkSize;
      continue;
    }

    if (!inserted && chunkType === 'IDAT') {
      result.push(...phys);
      inserted = true;
    }

    result.push(...pngData.slice(i, i + totalChunkSize));
    i += totalChunkSize;
  }

  return new Uint8Array(result);
}

// CRC32 implementation
function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) {
      crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
    }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// Load original icon for comparison
function loadOriginal(name) {
  const img = document.getElementById('origImg');
  img.src = '../Resources/Icons/' + name + '_32.png';
  img.onerror = () => { img.alt = '元画像なし'; };
}

// ============================================================
// PRESETS - Drawing code for each icon
// ============================================================
const PRESETS = {};

PRESETS.both = `
// 通り芯・レベル 両端表示
const DARK = '#323232';
const R = 3;

// Lines: bubble center to bubble center only (no overhang)
ctx.strokeStyle = DARK;
ctx.lineWidth = s(1);

ctx.beginPath();
// Vertical lines (top bubble bottom → bottom bubble top)
ctx.moveTo(s(10), s(4+R)); ctx.lineTo(s(10), s(28-R));
ctx.moveTo(s(22), s(4+R)); ctx.lineTo(s(22), s(28-R));
// Horizontal lines (left bubble right → right bubble left)
ctx.moveTo(s(4+R), s(10)); ctx.lineTo(s(28-R), s(10));
ctx.moveTo(s(4+R), s(22)); ctx.lineTo(s(28-R), s(22));
ctx.stroke();

function drawBubble(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(s(cx), s(cy), s(r), 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = DARK;
  ctx.lineWidth = s(1.2);
  ctx.stroke();
}

drawBubble(10, 4, R);
drawBubble(22, 4, R);
drawBubble(10, 28, R);
drawBubble(22, 28, R);
drawBubble(4, 10, R);
drawBubble(4, 22, R);
drawBubble(28, 10, R);
drawBubble(28, 22, R);
`;

PRESETS.left = `
// 通り芯・レベル 左端のみ
const DARK = '#323232';

ctx.strokeStyle = DARK;
ctx.lineWidth = s(1);

ctx.beginPath();
// Vertical lines: top bubble → bottom of canvas (no bottom bubble)
ctx.moveTo(s(10), s(4+R)); ctx.lineTo(s(10), s(28));
ctx.moveTo(s(22), s(4+R)); ctx.lineTo(s(22), s(28));
// Horizontal lines: left bubble → right of canvas (no right bubble)
ctx.moveTo(s(4+R), s(10)); ctx.lineTo(s(28), s(10));
ctx.moveTo(s(4+R), s(22)); ctx.lineTo(s(28), s(22));
ctx.stroke();

function drawBubble(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(s(cx), s(cy), s(r), 0, Math.PI * 2);

drawBubble(10, 4, R);

PRESETS.room_tag = `
// 部屋タグ (表形式)
const BLK = '#000000';
const LW = s(1);
ctx.strokeStyle = BLK;
ctx.lineWidth = LW;

// Outer border
ctx.strokeRect(s(1.5), s(1.5), s(29), s(29));

// Header row bottom
ctx.beginPath();
ctx.moveTo(s(1.5), s(11)); ctx.lineTo(s(30.5), s(11));
// Row dividers
ctx.moveTo(s(1.5), s(16.5)); ctx.lineTo(s(30.5), s(16.5));
ctx.moveTo(s(1.5), s(21.5)); ctx.lineTo(s(30.5), s(21.5));
ctx.moveTo(s(1.5), s(26.5)); ctx.lineTo(s(30.5), s(26.5));

// Column dividers (below header only)

ctx.moveTo(s(9.5), s(11)); ctx.lineTo(s(9.5), s(30.5));
ctx.moveTo(s(20), s(11)); ctx.lineTo(s(20), s(26.5));

`;

PRESETS.filled_region = `
// 塗潰し領域 分割・統合
const GRAY = '#646464';
const LW = s(0.8);
ctx.strokeStyle = GRAY;
ctx.lineWidth = LW;

// Left rectangle with crosshatch
ctx.strokeRect(s(1.5), s(1.5), s(12), s(22));
// Hatch pattern (left)
ctx.beginPath();
for (let i = -24; i < 36; i += 3) {
  const y0 = s(1.5) + s(i);
  const y1 = y0 + s(12);
  ctx.moveTo(s(1.5), Math.max(s(1.5), y0));
  ctx.lineTo(Math.min(s(13.5), s(1.5) + Math.min(s(12), y1 - s(1.5))), Math.min(s(23.5), y1));
}
ctx.stroke();

// Right rectangle with crosshatch (diagonal other direction)
ctx.strokeRect(s(18.5), s(1.5), s(12), s(22));
ctx.beginPath();
for (let i = -24; i < 36; i += 2.5) {
  const x0 = s(18.5);
  const y0 = s(1.5) + s(i);
  const len = s(12);
  ctx.moveTo(x0, Math.max(s(1.5), y0));
  ctx.lineTo(Math.min(s(30.5), x0 + len), Math.min(s(23.5), y0 + len));
}
ctx.stroke();

// Split/merge arrows at bottom
ctx.lineWidth = s(0.7);
ctx.beginPath();
const ay = s(27);
// Left arrow <
ctx.moveTo(s(12), s(24.5)); ctx.lineTo(s(8), ay); ctx.lineTo(s(12), s(29.5));
// Right arrow >
ctx.moveTo(s(20), s(24.5)); ctx.lineTo(s(24), ay); ctx.lineTo(s(20), s(29.5));
// Connecting line
ctx.moveTo(s(8), ay); ctx.lineTo(s(24), ay);
ctx.stroke();
`;

PRESETS.sheet_creation = `
// シート一括作成
const DARK = '#323232';
const MID = '#808080';
const LIGHT = '#C8C8C8';
const LW = s(1);

// Outer sheet (back)
ctx.strokeStyle = DARK;
ctx.lineWidth = LW;
ctx.fillStyle = '#ffffff';
ctx.fillRect(s(2), s(2), s(27), s(23));
ctx.strokeRect(s(2), s(2), s(27), s(23));

// Shadow edge
ctx.fillStyle = LIGHT;
ctx.fillRect(s(28), s(3), s(2), s(22));
ctx.fillRect(s(3), s(24), s(27), s(2));

// Title block separator
ctx.beginPath();
ctx.moveTo(s(3), s(19)); ctx.lineTo(s(28), s(19));
ctx.strokeStyle = MID;
ctx.stroke();

// Inner sheet (front, smaller)
ctx.fillStyle = '#ffffff';
ctx.fillRect(s(9), s(7), s(15), s(12));
ctx.strokeStyle = DARK;
ctx.strokeRect(s(9), s(7), s(15), s(12));

// Inner title block
ctx.beginPath();
ctx.moveTo(s(10), s(15)); ctx.lineTo(s(23), s(15));
ctx.strokeStyle = MID;
ctx.stroke();
`;

PRESETS.beam_under_level = `
// 梁下端色分け: I型梁(上) + 上矢印 + FL線(下) + 3色ブロック(右)
const DARK = '#505050';
const MID = '#787878';
const PINK = [255,128,148];
const YELLOW = [218,185,47];
const BLUE = [30,144,255];

// I-beam at top
ctx.fillStyle = MID;
// Top flange
ctx.fillRect(s(3), s(1), s(14), s(3));
// Bottom flange
ctx.fillRect(s(3), s(14), s(14), s(3));
// Web
ctx.fillRect(s(8), s(4), s(4), s(10));

// Up arrow
ctx.fillStyle = DARK;
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
// Arrow shaft
ctx.beginPath();
ctx.moveTo(s(10), s(22)); ctx.lineTo(s(10), s(12));
ctx.stroke();
// Arrow head (triangle)
ctx.beginPath();
ctx.moveTo(s(10), s(10));
ctx.lineTo(s(7.5), s(14));
ctx.lineTo(s(12.5), s(14));
ctx.closePath();
ctx.fill();

// FL line at bottom
ctx.strokeStyle = DARK;
ctx.lineWidth = s(0.8);
ctx.beginPath();
ctx.moveTo(s(1), s(27)); ctx.lineTo(s(20), s(27));
ctx.stroke();
// Triangle marker
ctx.beginPath();
ctx.moveTo(s(4), s(23));
ctx.lineTo(s(2.5), s(26));
ctx.lineTo(s(5.5), s(26));
ctx.closePath();
ctx.fillStyle = DARK;
ctx.fill();

// 3 color blocks on right
const bx = s(22), bw = s(8), bh = s(8);
[[PINK,1],[YELLOW,11],[BLUE,21]].forEach(([c, y]) => {
  ctx.fillStyle = 'rgb('+c.join(',')+')';
  ctx.fillRect(bx, s(y), bw, bh);
});
`;

PRESETS.beam_top_level = `

PRESETS.view_copy = `
// 3Dビュー コピー (アイソメトリック立方体・淡色)
const TOP = '#E0EEF8';
const LEFT = '#B8D4EC';
const RIGHT = '#9CC0DE';
const EDGE = '#3C3C3C';

const cx = s(16), cy = s(16);
const dx = s(11), dy = s(7);

// Face vertices
const top = [[cx,cy-dy-s(3)],[cx+dx,cy-s(3)],[cx,cy+dy-s(3)],[cx-dx,cy-s(3)]];
const left = [[cx-dx,cy-s(3)],[cx,cy+dy-s(3)],[cx,cy+dy+dy-s(3)],[cx-dx,cy+dy-s(3)]];
const right = [[cx,cy+dy-s(3)],[cx+dx,cy-s(3)],[cx+dx,cy+dy-s(3)],[cx,cy+dy+dy-s(3)]];

function drawFace(pts, fill) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = EDGE;
  ctx.lineWidth = s(0.7);
  ctx.stroke();
}

drawFace(left, LEFT);
drawFace(right, RIGHT);
drawFace(top, TOP);
`;

PRESETS.view_paste = `
// 3Dビュー ペースト (アイソメトリック立方体・濃色)
const TOP = '#66A3E0';
const LEFT = '#3380CC';
const RIGHT = '#1A66B3';
const EDGE = '#3C3C3C';

const cx = s(16), cy = s(16);

// Preset selection handler
document.getElementById('presetSelect').addEventListener('change', function() {
  const name = this.value;
  if (name && PRESETS[name]) {
    currentPreset = name;
    document.getElementById('code').value = PRESETS[name].trim();
    loadOriginal(name);
    runCode();
  }
});

// Auto-run on load with "both" preset
window.addEventListener('load', () => {
  document.getElementById('presetSelect').value = 'both';
  currentPreset = 'both';
  document.getElementById('code').value = PRESETS.both.trim();
  loadOriginal('both');
  setTimeout(runCode, 100);
});
</script>
