name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into main
        id: merge
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          echo "Merging $BRANCH into main..."

          git checkout main
          git pull origin main

          # Squash merge
          if git merge --squash "origin/$BRANCH"; then
            git commit -m "Auto: $COMMIT_MSG"
            git push origin main
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "Successfully merged $BRANCH into main!"
          else
            echo "::error::Merge failed. Rebase the branch onto main and push again."
            echo "merged=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Close any open PR
        if: steps.merge.outputs.merged == 'true'
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --comment "Auto-merged directly to main." || true
            echo "Closed PR #$PR_NUMBER"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete source branch
        if: steps.merge.outputs.merged == 'true'
        run: |
          git push origin --delete "${{ github.ref_name }}" || true
          echo "Deleted branch ${{ github.ref_name }}"

      - name: Trigger deploy workflow
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "Triggering deploy-pages.yml on main..."
          gh workflow run deploy-pages.yml --ref main || true
          echo "Deploy workflow triggered"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
