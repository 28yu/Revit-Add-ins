name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check-pr
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create-pr
        if: steps.check-pr.outputs.pr_number == ''
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "Auto: ${{ github.event.head_commit.message }}" \
            --body "Claude Code による自動PR

          **ブランチ**: \`${{ github.ref_name }}\`
          **コミット**: ${{ github.event.head_commit.message }}")
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Pull Request
        id: merge
        run: |
          PR_NUMBER="${{ steps.check-pr.outputs.pr_number || steps.create-pr.outputs.pr_number }}"
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --squash --delete-branch
            echo "merged=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for merge to propagate
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "Waiting for merge to propagate to main..."
          sleep 10

      - name: Verify merge on main
        if: steps.merge.outputs.merged == 'true'
        run: |
          MAIN_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          echo "Latest main SHA: $MAIN_SHA"
          MAIN_MSG=$(gh api repos/${{ github.repository }}/commits/$MAIN_SHA --jq '.commit.message' | head -1)
          echo "Latest main commit: $MAIN_MSG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy workflow
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "Triggering deploy-pages.yml on main..."
          gh workflow run deploy-pages.yml --ref main
          echo "Deploy workflow triggered successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
