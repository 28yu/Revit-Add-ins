name: 自動マージ (claude ブランチ)

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into main
        id: merge
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          BRANCH="${{ github.ref_name }}"

          echo "Merging $BRANCH into main..."

          git checkout main
          git pull origin main

          # Squash merge
          if git merge --squash "origin/$BRANCH"; then
            # Extract first line of commit message for squash commit
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
            git commit -m "Auto: $FIRST_LINE"
            git push origin main
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "Successfully merged $BRANCH into main!"
          else
            echo "::error::Merge failed. Rebase the branch onto main and push again."
            echo "merged=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Close all open claude PRs and delete stale branches
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "=== Closing all open PRs from claude/* branches ==="
          PR_DATA=$(gh pr list --search "head:claude/" --state open --json number,headRefName 2>/dev/null || echo "[]")
          echo "$PR_DATA" | jq -r '.[] | "\(.number) \(.headRefName)"' | while read -r PR_NUMBER BRANCH_NAME; do
            if [ -n "$PR_NUMBER" ]; then
              gh pr close "$PR_NUMBER" --comment "Auto-merged directly to main (squash merge)." || true
              echo "Closed PR #$PR_NUMBER ($BRANCH_NAME)"
            fi
          done

          echo ""
          echo "=== Deleting all claude/* branches ==="
          git fetch --prune origin
          CLAUDE_BRANCHES=$(git branch -r --list 'origin/claude/*' | sed 's|origin/||' | tr -d ' ')
          if [ -n "$CLAUDE_BRANCHES" ]; then
            echo "$CLAUDE_BRANCHES" | while read -r BRANCH; do
              if [ -n "$BRANCH" ]; then
                git push origin --delete "$BRANCH" 2>/dev/null && echo "Deleted branch $BRANCH" || echo "Failed to delete $BRANCH (may already be deleted)"
              fi
            done
          else
            echo "No claude/* branches found."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy workflow
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "Triggering deploy-pages.yml on main..."
          gh workflow run deploy-pages.yml --ref main || true
          echo "Deploy workflow triggered"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
