name: Build and Release
run-name: "${{ github.event.inputs.test_only == 'true' && '🔨 テストビルド' || 'ビルド＆リリース' }} ${{ github.ref_name }}"

on:
  # タグ push で自動リリース (例: git tag v1.0 && git push --tags)
  push:
    tags:
      - 'v*'
    # release/v* ブランチ push でもリリース (Claude Code環境用)
    # build/* ブランチ push でテストビルドのみ (リリースなし)
    branches:
      - 'release/v*'
      - 'build/*'
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン (例: 1.0)'
        required: true
        default: '1.0'
      test_only:
        description: 'テストビルドのみ（リリースしない）'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        revit-version: ['2021', '2022', '2023', '2024', '2025', '2026']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build for Revit ${{ matrix.revit-version }}
        run: |
          dotnet build Tools28.csproj `
            -c Release `
            /p:RevitVersion=${{ matrix.revit-version }}

      - name: Create package
        shell: pwsh
        run: |
          $ver = "${{ matrix.revit-version }}"
          $outDir = "artifact"
          $tools28Dir = "$outDir/28Tools"

          New-Item -ItemType Directory -Path $tools28Dir -Force | Out-Null

          # 全DLL を 28Tools/ にコピー（Tools28.dll + ClosedXML等の依存ライブラリ）
          Copy-Item "bin/Release/Revit$ver/*.dll" "$tools28Dir/"

          # .addin を 28Tools/ にコピー
          Copy-Item "Packages/$ver/28Tools/Tools28.addin" "$tools28Dir/Tools28.addin"

          # install.bat, uninstall.bat, README.txt をルートにコピー
          Copy-Item "Packages/$ver/install.bat" "$outDir/install.bat"
          Copy-Item "Packages/$ver/uninstall.bat" "$outDir/uninstall.bat"
          Copy-Item "Packages/$ver/README.txt" "$outDir/README.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 28Tools_Revit${{ matrix.revit-version }}
          path: artifact/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/v') || github.event_name == 'workflow_dispatch') && github.event.inputs.test_only != 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            REF="${{ github.ref_name }}"
            # release/v2.2 -> v2.2 -> 2.2 or v2.2 -> 2.2
            REF="${REF#release/}"
            echo "version=${REF#v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release body
        run: |
          python3 scripts/generate-release-body.py \
            --version ${{ steps.version.outputs.version }} \
            --features Docs/features.json \
            > release-body.md
          cat release-body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create ZIP packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for dir in artifacts/28Tools_Revit*/; do
            REVIT_VER=$(basename "$dir" | sed 's/28Tools_Revit//')
            ZIP_NAME="28Tools_Revit${REVIT_VER}_v${VERSION}.zip"
            cd "$dir"
            zip -r "../../dist/$ZIP_NAME" .
            cd ../..
            echo "Created: $ZIP_NAME"
          done

          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "28 Tools v${{ steps.version.outputs.version }}"
          body_path: release-body.md
          files: dist/*.zip
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: false

      - name: Upload to download site (28tools-download)
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.DOWNLOAD_SITE_TOKEN }}
          repository: 28yu/28tools-download
          name: "28 Tools v${{ steps.version.outputs.version }}"
          body_path: release-body.md
          files: dist/*.zip
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: false

      - name: Delete release branch
        if: startsWith(github.ref, 'refs/heads/release/v')
        run: git push origin --delete "${{ github.ref_name }}" || true
