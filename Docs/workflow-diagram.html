<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools28 開発ワークフロー 相関図</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Zen Maru Gothic','Hiragino Sans','Meiryo',sans-serif;
  background-color:#fef9ef;
  background-image:radial-gradient(circle,#e8dcc8 0.8px,transparent 0.8px);
  background-size:22px 22px;
  min-height:100vh;
  color:#3d3229;
}

/* ===== Title ===== */
.title-area{text-align:center;padding:28px 16px 2px}
.title-area h1{
  display:inline;
  font-size:1.6rem;font-weight:900;color:#2d2d2d;
  background:linear-gradient(transparent 60%,rgba(252,211,77,0.5) 60%);
  padding:0 6px;
}
.subtitle{
  text-align:center;font-size:0.88rem;color:#8d7e6e;
  padding:8px 16px 0;font-weight:700;
}

/* ===== Legend ===== */
.legend{
  display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
  padding:14px 16px 6px;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;color:#6b5e50}
.legend-dot{width:13px;height:13px;border-radius:50%;border:2px solid}
.ld-you{background:#dbeafe;border-color:#3b82f6}
.ld-ai{background:#ede9fe;border-color:#8b5cf6}
.ld-auto{background:#f1f5f9;border-color:#94a3b8}

/* ===== Canvas ===== */
.canvas-wrap{
  width:100%;overflow:hidden;
  display:flex;justify-content:center;
  padding:8px 0 32px;
}
.canvas{
  position:relative;width:920px;height:700px;
  transform-origin:top center;flex-shrink:0;
}

/* ===== SVG Arrows ===== */
.canvas>svg{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;z-index:1;
}

/* ===== Nodes ===== */
.node{
  position:absolute;display:flex;flex-direction:column;
  align-items:center;text-align:center;z-index:2;
  cursor:default;transition:transform 0.2s ease;
}
.node:hover{transform:scale(1.07)}

.node-circle{
  border-radius:50%;overflow:hidden;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,0.08);
  position:relative;
}
.node-circle img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.node-circle .fb{
  display:none;
  font-size:2rem;width:100%;height:100%;
  align-items:center;justify-content:center;
  background:#fff;
}
.node-name{
  margin-top:7px;font-size:0.88rem;font-weight:900;
  color:#2d2d2d;line-height:1.25;
}
.node-sub{
  font-size:0.68rem;font-weight:700;color:#a09585;
  margin-top:1px;line-height:1.3;
}

/* Node sizes */
.node.sz-lg .node-circle{width:130px;height:130px;border:5px solid}
.node.sz-md .node-circle{width:100px;height:100px;border:4px solid}
.node.sz-sm .node-circle{width:78px;height:78px;border:3px solid}

/* Border colors */
.bc-pink{border-color:#f472b6 !important}
.bc-purple{border-color:#a78bfa !important}
.bc-blue{border-color:#60a5fa !important}
.bc-cyan{border-color:#22d3ee !important}
.bc-dark{border-color:#475569 !important}
.bc-gray{border-color:#94a3b8 !important}
.bc-gold{border-color:#fbbf24 !important}

/* ===== Arrow Labels ===== */
.arrow-label{
  position:absolute;z-index:5;pointer-events:none;
  font-size:0.7rem;font-weight:700;
  padding:3px 10px;border-radius:10px;
  white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.al-blue{background:#dbeafe;color:#1d4ed8}
.al-purple{background:#ede9fe;color:#6d28d9}
.al-gray{background:#f1f5f9;color:#475569}
.al-green{background:#dcfce7;color:#166534}
.al-red{background:#fee2e2;color:#991b1b}

/* ===== Decorations ===== */
.deco{
  position:absolute;z-index:0;pointer-events:none;
  font-size:1.1rem;opacity:0.35;
  animation:float 4s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* ===== Footer ===== */
.footer{
  text-align:center;padding:0 16px 28px;
  font-size:0.75rem;color:#a09585;font-weight:700;
}
.footer a{color:#6366f1;text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="title-area"><h1>Tools28 開発ワークフロー 相関図</h1></div>
<p class="subtitle">あなたが考えて指示 &rarr; AI が全て書く &rarr; 自動でビルド &rarr; あなたが確認</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot ld-you"></div>あなたが行う</div>
  <div class="legend-item"><div class="legend-dot ld-ai"></div>AI が行う</div>
  <div class="legend-item"><div class="legend-dot ld-auto"></div>自動で動く</div>
</div>

<div class="canvas-wrap">
<div class="canvas" id="canvas">
  <svg id="arrow-svg" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- ===== Nodes ===== -->

  <!-- あなた (center) -->
  <div class="node sz-lg" id="n-you" style="left:395px;top:228px;width:130px">
    <div class="node-circle bc-pink">
      <img src="icons/you.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">🙂</span>
    </div>
    <div class="node-name">あなた</div>
    <div class="node-sub">監督・プロデューサー</div>
  </div>

  <!-- Claude Code (upper-left) -->
  <div class="node sz-md" id="n-claude" style="left:100px;top:60px;width:120px">
    <div class="node-circle bc-purple">
      <img src="icons/claude.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">🤖</span>
    </div>
    <div class="node-name">Claude Code</div>
    <div class="node-sub">AI 脚本家</div>
  </div>

  <!-- Revit (right) -->
  <div class="node sz-md" id="n-revit" style="left:700px;top:165px;width:120px">
    <div class="node-circle bc-cyan">
      <img src="icons/revit.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb" style="font-weight:900;font-size:1.8rem;color:#0891b2">R</span>
    </div>
    <div class="node-name">Revit</div>
    <div class="node-sub">舞台（動作確認）</div>
  </div>

  <!-- PowerShell (lower-left) -->
  <div class="node sz-md" id="n-ps" style="left:95px;top:415px;width:120px">
    <div class="node-circle bc-blue">
      <img src="icons/powershell.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb" style="font-size:1.3rem;font-weight:900;color:#2563eb">&gt;_</span>
    </div>
    <div class="node-name">PowerShell</div>
    <div class="node-sub">現場スタッフ</div>
  </div>

  <!-- NuGet (far-left, small) -->
  <div class="node sz-sm" id="n-nuget" style="left:25px;top:248px;width:95px">
    <div class="node-circle bc-gray">
      <img src="icons/nuget.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">📦</span>
    </div>
    <div class="node-name">NuGet</div>
    <div class="node-sub">小道具係</div>
  </div>

  <!-- GitHub (bottom-center) -->
  <div class="node sz-md" id="n-github" style="left:350px;top:510px;width:120px">
    <div class="node-circle bc-dark">
      <img src="icons/github.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">🐙</span>
    </div>
    <div class="node-name">GitHub</div>
    <div class="node-sub">台本倉庫</div>
  </div>

  <!-- GitHub Actions (bottom-right) -->
  <div class="node sz-sm" id="n-actions" style="left:590px;top:530px;width:105px">
    <div class="node-circle bc-gray">
      <img src="icons/actions.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">⚡</span>
    </div>
    <div class="node-name">GitHub Actions</div>
    <div class="node-sub">自動スタッフ</div>
  </div>

  <!-- ユーザー (far-right) -->
  <div class="node sz-sm" id="n-users" style="left:770px;top:430px;width:105px">
    <div class="node-circle bc-gold">
      <img src="icons/users.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fb">👥</span>
    </div>
    <div class="node-name">ユーザー</div>
    <div class="node-sub">ダウンロードして使う</div>
  </div>

  <!-- ===== Decorative doodles ===== -->
  <span class="deco" style="left:310px;top:55px;animation-delay:0s">✦</span>
  <span class="deco" style="left:540px;top:170px;animation-delay:0.8s">✧</span>
  <span class="deco" style="left:850px;top:330px;animation-delay:1.6s">✦</span>
  <span class="deco" style="left:260px;top:480px;animation-delay:2.4s">✧</span>
  <span class="deco" style="left:720px;top:620px;animation-delay:0.4s">✦</span>
  <span class="deco" style="left:50px;top:160px;animation-delay:1.2s">✧</span>
  <span class="deco" style="left:480px;top:420px;animation-delay:2s">✦</span>

</div><!-- canvas -->
</div><!-- canvas-wrap -->

<div class="footer">
  Tools28 — Revit Add-in 開発プロジェクト ｜ <a href="https://github.com/28yu/Revit-Add-ins" target="_blank">GitHub</a>
</div>

<script>
(function(){
  // ========== Node center coordinates ==========
  function getCenter(id){
    const el=document.getElementById(id);
    const circle=el.querySelector('.node-circle');
    const r=circle.offsetWidth/2;
    const x=el.offsetLeft+el.offsetWidth/2;
    const y=el.offsetTop+r;
    return {x,y,r};
  }

  // ========== Arrow definitions ==========
  const arrows=[
    {from:'n-you',to:'n-claude',label:'指示を出す 💬',cls:'al-blue',curve:40},
    {from:'n-claude',to:'n-you',label:'コードを全て書く ✨',cls:'al-purple',curve:40},
    {from:'n-you',to:'n-ps',label:'ビルドを実行 🔨',cls:'al-blue',curve:25},
    {from:'n-nuget',to:'n-ps',label:'部品を自動調達',cls:'al-gray',curve:0,dashed:true},
    {from:'n-you',to:'n-revit',label:'動作を確認 🔍',cls:'al-blue',curve:-30},
    {from:'n-revit',to:'n-you',label:'OK! 👍',cls:'al-green',curve:-30},
    {from:'n-revit',to:'n-claude',label:'NG → 修正を指示 🔄',cls:'al-red',curve:-25,dashed:true},
    {from:'n-you',to:'n-github',label:'git push で保管 💾',cls:'al-blue',curve:-15},
    {from:'n-github',to:'n-actions',label:'タグで自動トリガー ⚡',cls:'al-gray',curve:-15},
    {from:'n-actions',to:'n-users',label:'ZIP 自動配布 📦',cls:'al-gray',curve:-25},
  ];

  // ========== SVG helpers ==========
  const NS='http://www.w3.org/2000/svg';
  const svg=document.getElementById('arrow-svg');

  function createMarker(color,id){
    const defs=svg.querySelector('defs')||svg.appendChild(document.createElementNS(NS,'defs'));
    const m=document.createElementNS(NS,'marker');
    m.setAttribute('id',id);
    m.setAttribute('viewBox','0 0 10 7');
    m.setAttribute('refX','9');
    m.setAttribute('refY','3.5');
    m.setAttribute('markerWidth','8');
    m.setAttribute('markerHeight','6');
    m.setAttribute('orient','auto');
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d','M0 0 L10 3.5 L0 7 Z');
    p.setAttribute('fill',color);
    m.appendChild(p);
    defs.appendChild(m);
    return id;
  }

  // Color map
  const colorMap={
    'al-blue':'#3b82f6',
    'al-purple':'#8b5cf6',
    'al-gray':'#94a3b8',
    'al-green':'#22c55e',
    'al-red':'#ef4444',
  };

  // Create markers for each color
  const markers={};
  Object.entries(colorMap).forEach(([cls,col])=>{
    const mid='mk-'+cls;
    createMarker(col,mid);
    markers[cls]=mid;
  });

  // ========== Draw arrows ==========
  const canvas=document.getElementById('canvas');

  arrows.forEach(a=>{
    const f=getCenter(a.from);
    const t=getCenter(a.to);
    const dx=t.x-f.x, dy=t.y-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/dist, uy=dy/dist;

    // Start/end on circle edge (with small gap for arrowhead)
    const sx=f.x+ux*(f.r+4), sy=f.y+uy*(f.r+4);
    const ex=t.x-ux*(t.r+10), ey=t.y-uy*(t.r+10);

    // Perpendicular for curve
    const nx=-uy, ny=ux;
    const cv=a.curve||0;
    const cx2=(sx+ex)/2+nx*cv;
    const cy2=(sy+ey)/2+ny*cv;

    // SVG path
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',`M${sx} ${sy} Q${cx2} ${cy2} ${ex} ${ey}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',colorMap[a.cls]);
    path.setAttribute('stroke-width','2.8');
    path.setAttribute('stroke-linecap','round');
    if(a.dashed) path.setAttribute('stroke-dasharray','7 5');
    path.setAttribute('marker-end',`url(#${markers[a.cls]})`);
    svg.appendChild(path);

    // Label position (midpoint of quadratic bezier)
    const lx=(sx+2*cx2+ex)/4;
    const ly=(sy+2*cy2+ey)/4;

    const lbl=document.createElement('div');
    lbl.className='arrow-label '+a.cls;
    lbl.textContent=a.label;
    lbl.style.left=lx+'px';
    lbl.style.top=ly+'px';
    lbl.style.transform='translate(-50%,-50%)';
    canvas.appendChild(lbl);
  });

  // ========== Responsive scaling ==========
  function scaleCanvas(){
    const wrap=document.querySelector('.canvas-wrap');
    const c=document.getElementById('canvas');
    const avail=wrap.clientWidth-16;
    const s=Math.min(1,avail/920);
    c.style.transform='scale('+s+')';
    wrap.style.height=(700*s+20)+'px';
  }
  window.addEventListener('resize',scaleCanvas);
  scaleCanvas();

})();
</script>
</body>
</html>
